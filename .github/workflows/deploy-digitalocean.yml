name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_id:
        description: "Existing DigitalOcean App ID. Leave blank to create a new app."
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      DO_BRANCH: ${{ github.ref_name }}
      DO_APP_ID: ${{ inputs.app_id || vars.DIGITALOCEAN_APP_ID }}
      DIGITALOCEAN_REGISTRY_NAME: ${{ vars.DIGITALOCEAN_REGISTRY_NAME }}
      DEMO_MODE: ${{ vars.DEMO_MODE || 'live' }}
      CHAIN_BACKEND: ${{ vars.CHAIN_BACKEND || 'simulated' }}
      DEFAULT_PROVIDER: ${{ vars.DEFAULT_PROVIDER || 'google' }}
      DEFAULT_MODEL: ${{ vars.DEFAULT_MODEL || 'gemma-4-27b-it' }}
      AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
      AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE || 'https://api.vellum.io' }}
      AUTH0_SPA_CLIENT_ID: ${{ vars.AUTH0_SPA_CLIENT_ID }}
      REGISTRY_ADMIN_SECRET: ${{ secrets.REGISTRY_ADMIN_SECRET || 'change-me-before-production' }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run backend tests
        run: uv run --extra dev pytest tests/integration/test_auth_flow.py tests/unit/test_jwt.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push container image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          registry_name="${DIGITALOCEAN_REGISTRY_NAME:-vellum-${owner}}"
          image_tag="${GITHUB_SHA}"

          if ! doctl registry get "${registry_name}" >/dev/null 2>&1; then
            doctl registry create "${registry_name}" --region nyc3
          fi

          doctl registry login --expiry-seconds 1200

          image="registry.digitalocean.com/${registry_name}/vellum:${image_tag}"
          docker build \
            -f docker/Dockerfile \
            --build-arg VITE_API_BASE_URL="" \
            --build-arg VITE_AUTH0_DOMAIN="${AUTH0_DOMAIN}" \
            --build-arg VITE_AUTH0_CLIENT_ID="${AUTH0_SPA_CLIENT_ID}" \
            --build-arg VITE_AUTH0_AUDIENCE="${AUTH0_AUDIENCE}" \
            -t "${image}" \
            .
          docker push "${image}"

          {
            echo "DO_REGISTRY_NAME=${registry_name}"
            echo "IMAGE_TAG=${image_tag}"
          } >> "${GITHUB_ENV}"

      - name: Render DigitalOcean app spec
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          replacements = {
              "__DO_REGISTRY_NAME__": os.environ["DO_REGISTRY_NAME"],
              "__IMAGE_TAG__": os.environ["IMAGE_TAG"],
              "__DEMO_MODE__": os.environ.get("DEMO_MODE", "live"),
              "__CHAIN_BACKEND__": os.environ.get("CHAIN_BACKEND", "simulated"),
              "__DEFAULT_PROVIDER__": os.environ.get("DEFAULT_PROVIDER", "google"),
              "__DEFAULT_MODEL__": os.environ.get("DEFAULT_MODEL", "gemma-4-27b-it"),
              "__AUTH0_DOMAIN__": os.environ.get("AUTH0_DOMAIN", ""),
              "__AUTH0_AUDIENCE__": os.environ.get("AUTH0_AUDIENCE", "https://api.vellum.io"),
              "__AUTH0_SPA_CLIENT_ID__": os.environ.get("AUTH0_SPA_CLIENT_ID", ""),
              "__REGISTRY_ADMIN_SECRET__": os.environ.get("REGISTRY_ADMIN_SECRET", ""),
              "__GOOGLE_API_KEY__": os.environ.get("GOOGLE_API_KEY", ""),
              "__MINIMAX_API_KEY__": os.environ.get("MINIMAX_API_KEY", ""),
          }

          spec = Path(".do/app.yaml.template").read_text()
          for key, value in replacements.items():
              spec = spec.replace(key, value)
          Path(".do/app.generated.yaml").write_text(spec)
          PY

      - name: Deploy app
        run: |
          if [ -n "${DO_APP_ID}" ]; then
            doctl apps update "${DO_APP_ID}" --spec .do/app.generated.yaml --wait
          else
            doctl apps create --spec .do/app.generated.yaml --wait --format ID,DefaultIngress --no-header
          fi
