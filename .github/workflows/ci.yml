name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run pytest tests/unit -v --tb=short
      - run: uv run pytest tests/integration -v --tb=short
      - name: Adversarial suite
        run: uv run pytest tests/adversarial -v --tb=short || true
      - name: Upload adversarial report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-report
          path: adversarial_report.json
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd extension && npm ci
      - run: cd extension && npm run build || true
