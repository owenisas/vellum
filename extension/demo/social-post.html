<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vellum Social Post Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100vw - 32px));
      }

      .post {
        padding: 24px;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }

      .handle {
        margin: 0 0 12px;
        color: #6b7280;
        font-size: 14px;
      }

      .body {
        min-height: 160px;
        padding: 16px;
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .hint {
        margin: 12px 0 0;
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="post" aria-label="Social post mock">
        <p class="handle">@demo_writer</p>
        <div class="body" contenteditable="true" spellcheck="false">
Paste the anchored Vellum paragraph here, then open the Chrome extension and click Scan page.
        </div>
        <p class="hint">
          This page preserves zero-width characters for a reliable live demo.
        </p>
      </section>
    </main>
  </body>
</html>
